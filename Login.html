<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIETCode | Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

        :root {
            --orange: #ffa116;
            --orange-dim: rgba(255, 161, 22, 0.15);
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --green: #3fb950;
            --red: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 161, 22, 0.12);
            top: -100px;
            left: -100px;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: rgba(63, 185, 80, 0.08);
            bottom: -80px;
            right: -80px;
        }

        .card-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s cubic-bezier(.16, 1, .3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand {
            font-size: 26px;
            font-weight: 800;
            color: var(--orange);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .brand span {
            color: var(--text);
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .auth-tabs {
            display: flex;
            background: var(--surface2);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 9px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .auth-tab.active {
            background: var(--bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px var(--orange-dim);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: color 0.15s;
        }

        .toggle-pw:hover {
            color: var(--text);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--orange);
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 18px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--orange);
            color: #000;
            border: none;
            border-radius: 9px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 161, 22, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .btn-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .social-btn {
            width: 100%;
            padding: 11px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-btn:hover {
            border-color: var(--text-muted);
            background: var(--bg);
        }

        .social-btn img {
            width: 18px;
            height: 18px;
        }

        .toast {
            padding: 11px 14px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 18px;
            gap: 8px;
            display: none;
            align-items: center;
        }

        .toast.error {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: var(--red);
            display: flex;
        }

        .toast.success {
            background: rgba(63, 185, 80, 0.15);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: var(--green);
            display: flex;
        }

        .card-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--orange);
            text-decoration: none;
            font-weight: 600;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="card-wrap">
        <div class="card">
            <div class="card-header">
                <a href="Explore.html" class="brand">NIET<span>Code</span></a>
                <p class="tagline">Practice. Compete. Level up.</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchMode('login', this)">Sign In</div>
                <div class="auth-tab" onclick="switchMode('signup', this)">Sign Up</div>
            </div>

            <div class="toast" id="toast"></div>

            <!-- LOGIN FORM -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope icon"></i>
                        <input type="email" class="form-input" id="login-email" placeholder="you@niet.co.in" required
                            autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock icon"></i>
                        <input type="password" class="form-input" id="login-password" placeholder="Enter your password"
                            required autocomplete="current-password">
                        <span class="toggle-pw" onclick="togglePw('login-password', this)"><i
                                class="fa-regular fa-eye"></i></span>
                    </div>
                </div>
                <a href="#" class="forgot-link" onclick="handleForgot(event)">Forgot password?</a>
                <button type="submit" class="btn-primary" id="login-btn">
                    <div class="btn-text">
                        <div class="spinner" id="login-spinner"></div><span id="login-text">Sign In</span>
                    </div>
                </button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup-form" style="display:none;" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-user icon"></i>
                        <input type="text" class="form-input" id="signup-name" placeholder="Enter Your " required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope icon"></i>
                        <input type="email" class="form-input" id="signup-email" placeholder="you@niet.co.in" required
                            autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span style="color:var(--text-muted);font-weight:400;">(min. 6
                            characters)</span></label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock icon"></i>
                        <input type="password" class="form-input" id="signup-password"
                            placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
                        <span class="toggle-pw" onclick="togglePw('signup-password', this)"><i
                                class="fa-regular fa-eye"></i></span>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="signup-btn">
                    <div class="btn-text">
                        <div class="spinner" id="signup-spinner"></div><span id="signup-text">Create Account</span>
                    </div>
                </button>
            </form>

            <div class="divider"><span>or continue with</span></div>

            <button class="social-btn" onclick="handleGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <div class="card-footer" id="form-footer">
                Don't have an account? <a href="#"
                    onclick="switchMode('signup', document.querySelectorAll('.auth-tab')[1])">Sign up free</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvS473QS25-jvd_zm4VmOA5UX4yIbvytU",
            authDomain: "niet-code.firebaseapp.com",
            projectId: "niet-code",
            storageBucket: "niet-code.firebasestorage.app",
            messagingSenderId: "331564337114",
            appId: "1:331564337114:web:56c072292a02d8fc4422e3"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ─────────────────────────────────────────────────────
        // FIX: This flag prevents onAuthStateChanged from
        // auto-redirecting while a signup/login is in progress.
        // Without it, Firebase fires the listener the moment
        // a new account is created, bouncing the user back to
        // Explore before onAuthSuccess() even runs.
        // ─────────────────────────────────────────────────────
        let authOperationInProgress = false;

        // ── After successful auth → redirect to Explore ──────
        function onAuthSuccess(user) {
            showToast(`Welcome, ${user.displayName || user.email}! Redirecting...`, 'success');
            setTimeout(() => { window.location.href = 'Explore.html'; }, 1200);
        }

        // ── Auto-redirect ONLY if already logged in on page load ──
        // The flag check ensures we never interfere with an active
        // signup or login flow triggered by the user.
        auth.onAuthStateChanged(user => {
            if (authOperationInProgress) return; // let the async handler do the redirect
            if (user) window.location.href = 'Explore.html';
        });

        // ── UI helpers ────────────────────────────────────────
        function showToast(msg, type = 'error') {
            const t = document.getElementById('toast');
            const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fa-solid ${icon}"></i>&nbsp;${msg}`;
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.className = 'toast'; }, 5000);
        }

        function setLoading(btnId, spinnerId, textId, loading, label) {
            document.getElementById(btnId).disabled = loading;
            document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
            document.getElementById(textId).textContent = loading ? 'Please wait...' : label;
        }

        function firebaseErrorMsg(code) {
            const map = {
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Try again.',
                'auth/email-already-in-use': 'Email already registered. Sign in instead.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/too-many-requests': 'Too many attempts. Try again later.',
                'auth/network-request-failed': 'Network error. Check your connection.',
                'auth/popup-closed-by-user': 'Sign-in cancelled.',
                'auth/invalid-credential': 'Invalid email or password.',
                'auth/popup-blocked': 'Popup blocked! Allow popups for this site in your browser settings.',
            };
            return map[code] || `Error: ${code}`;
        }

        function switchMode(mode, tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const isLogin = mode === 'login';
            document.getElementById('login-form').style.display = isLogin ? '' : 'none';
            document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
            document.getElementById('form-footer').innerHTML = isLogin
                ? `Don't have an account? <a href="#" onclick="switchMode('signup', document.querySelectorAll('.auth-tab')[1])">Sign up free</a>`
                : `Already have an account? <a href="#" onclick="switchMode('login', document.querySelectorAll('.auth-tab')[0])">Sign in</a>`;
            document.getElementById('toast').className = 'toast';
        }

        function togglePw(inputId, icon) {
            const input = document.getElementById(inputId);
            const hidden = input.type === 'password';
            input.type = hidden ? 'text' : 'password';
            icon.innerHTML = hidden ? '<i class="fa-regular fa-eye-slash"></i>' : '<i class="fa-regular fa-eye"></i>';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            setLoading('login-btn', 'login-spinner', 'login-text', true, 'Sign In');
            authOperationInProgress = true; // block the listener
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                onAuthSuccess(cred.user);
            } catch (err) {
                authOperationInProgress = false; // release the listener on failure
                showToast(firebaseErrorMsg(err.code));
                setLoading('login-btn', 'login-spinner', 'login-text', false, 'Sign In');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            setLoading('signup-btn', 'signup-spinner', 'signup-text', true, 'Create Account');
            authOperationInProgress = true; // block the listener
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: name });
                await cred.user.reload(); // ensure displayName is synced before redirect
                onAuthSuccess(firebase.auth().currentUser);
            } catch (err) {
                authOperationInProgress = false; // release the listener on failure
                showToast(firebaseErrorMsg(err.code));
                setLoading('signup-btn', 'signup-spinner', 'signup-text', false, 'Create Account');
            }
        }

        async function handleGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            authOperationInProgress = true; // block the listener
            try {
                const result = await auth.signInWithPopup(provider);
                onAuthSuccess(result.user);
            } catch (err) {
                authOperationInProgress = false; // release the listener on failure
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    showToast(firebaseErrorMsg(err.code));
                }
            }
        }

        async function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            if (!email) { showToast('Type your email above first.'); document.getElementById('login-email').focus(); return; }
            try {
                await auth.sendPasswordResetEmail(email);
                showToast('Reset email sent! Check your inbox.', 'success');
            } catch (err) { showToast(firebaseErrorMsg(err.code)); }
        }
    </script>
</body>

</html>
