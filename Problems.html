<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIETCode | Problems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Firebase BEFORE Monaco -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
:root{--orange:#ffa116;--orange-glow:rgba(255,161,22,0.25);--bg:#080b10;--bg2:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--border2:#1e2d40;--text:#e6edf3;--text-muted:#8b949e;--text-soft:#9ab0cc;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#d2a8ff;--yellow:#ffa657;--cyan:#79c0ff;--easy:#3fb950;--medium:#ffa657;--hard:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── NAVBAR ── */
.navbar{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(8,11,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--orange);text-decoration:none}.nav-brand span{color:var(--text)}
.nav-links{display:flex;gap:30px;align-items:center}
.nav-link{text-decoration:none;color:var(--text-muted);font-size:14px;font-weight:500;transition:color .2s;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}.nav-link:hover,.nav-link.active{color:var(--text)}
.nav-right{display:flex;gap:12px;align-items:center;min-width:180px;justify-content:flex-end}
.btn-ghost{padding:8px 18px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text-soft);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:.2s;font-family:inherit}.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-cta{padding:8px 20px;border-radius:8px;border:none;background:var(--orange);color:#000;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;font-family:inherit}.btn-cta:hover{filter:brightness(1.1)}
.profile-wrap{position:relative}.user-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:5px 14px 5px 6px;cursor:pointer;transition:.2s;user-select:none}.user-pill:hover{border-color:var(--orange)}
.user-avatar{width:32px;height:32px;border-radius:8px;background:var(--orange);color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'Syne';flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-chevron{color:var(--text-muted);font-size:10px;transition:transform .2s}.profile-wrap.open .pill-chevron{transform:rotate(180deg)}
.profile-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:280px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5);opacity:0;visibility:hidden;transform:translateY(-8px);transition:.2s;z-index:200;overflow:hidden}.profile-wrap.open .profile-dropdown{opacity:1;visibility:visible;transform:translateY(0)}
.dd-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.dd-avatar{width:44px;height:44px;border-radius:12px;background:var(--orange);color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;font-family:'Syne';flex-shrink:0}
.dd-info{flex:1;min-width:0}.dd-name{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.dd-email{font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-menu{padding:6px 0}.dd-item{display:flex;align-items:center;gap:12px;padding:11px 18px;font-size:14px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;text-decoration:none}.dd-item:hover{background:var(--surface2);color:var(--text)}.dd-item i{width:18px;text-align:center;font-size:14px;color:var(--text-muted)}.dd-item:hover i{color:var(--orange)}
.dd-divider{height:1px;background:var(--border);margin:4px 0}.dd-item.dd-danger{color:var(--red)}.dd-item.dd-danger i{color:var(--red)}.dd-item.dd-danger:hover{background:rgba(248,81,73,.08)}

/* ── PROBLEM LIST VIEW ── */
.list-view{max-width:1100px;margin:0 auto;padding:28px 32px}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.list-header h1{font-family:'Syne';font-size:26px;font-weight:800}
.topic-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.topic-chip{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}.topic-chip:hover{border-color:var(--text-soft);color:var(--text)}.topic-chip.active{background:var(--orange);color:#000;border-color:var(--orange)}
.prob-table{width:100%;border-collapse:collapse}
.prob-table thead th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.prob-table tbody tr{border-bottom:1px solid rgba(48,54,61,.4);transition:background .1s}.prob-table tbody tr:hover{background:var(--surface)}
.prob-table td{padding:14px;font-size:14px}
.td-status{width:40px;text-align:center}
.td-title{font-weight:600;cursor:pointer;transition:color .15s}.td-title:hover{color:var(--orange)}
.diff-tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px}
.diff-easy{color:var(--easy);background:rgba(63,185,80,.1)}.diff-medium{color:var(--medium);background:rgba(255,166,87,.1)}.diff-hard{color:var(--hard);background:rgba(248,81,73,.1)}
.solve-btn{padding:6px 16px;border-radius:8px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}.solve-btn:hover{background:var(--blue);color:#000}

/* ── EDITOR VIEW ── */
.editor-view{display:none;height:calc(100vh - 64px)}
.ev-split{display:flex;height:100%}
.ev-left{width:45%;min-width:340px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg)}
.ev-right{flex:1;display:flex;flex-direction:column;background:var(--bg2)}
.ev-back{display:flex;align-items:center;gap:8px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:1px solid var(--border);transition:.15s;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;font-family:inherit}.ev-back:hover{color:var(--text);background:var(--surface)}
.ev-desc{padding:24px 24px 16px}
.ev-title{font-family:'Syne';font-size:22px;font-weight:800;margin-bottom:6px}
.ev-diff{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:16px}
.ev-section{margin-bottom:18px}.ev-section h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.ev-section p{font-size:14px;line-height:1.8;color:var(--text-soft)}
.ev-example{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7}
.ev-example .ex-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ev-example .ex-val{color:var(--cyan)}

/* Editor top bar */
.ed-topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.ed-lang select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;font-family:'DM Sans';cursor:pointer}
.ed-actions{display:flex;gap:8px}
.btn-run{padding:7px 18px;border-radius:8px;border:1px solid var(--green);background:transparent;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px}.btn-run:hover{background:var(--green);color:#000}
.btn-submit{padding:7px 18px;border-radius:8px;border:none;background:var(--orange);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px}.btn-submit:hover{filter:brightness(1.1)}
.btn-run:disabled,.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* Monaco container */
.ed-monaco{flex:1;min-height:0}

/* Results panel */
.ed-results{border-top:1px solid var(--border);background:var(--surface);max-height:240px;overflow-y:auto;padding:14px 18px}
.res-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tc-row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;font-family:'JetBrains Mono',monospace}
.tc-pass{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2)}.tc-pass .tc-icon{color:var(--green)}
.tc-fail{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2)}.tc-fail .tc-icon{color:var(--red)}
.tc-pending{background:var(--bg);border:1px solid var(--border)}.tc-pending .tc-icon{color:var(--text-muted)}
.tc-info{flex:1;min-width:0}.tc-info span{display:block;font-size:11px;color:var(--text-muted)}
.res-verdict{text-align:center;padding:16px;font-family:'Syne';font-size:20px;font-weight:800}
.verdict-ac{color:var(--green)}.verdict-wa{color:var(--red)}
.res-idle{color:var(--text-muted);font-size:14px;text-align:center;padding:20px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--text-muted);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){.navbar{padding:0 16px}.list-view{padding:20px 16px}.ev-split{flex-direction:column}.ev-left{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}.ev-right{flex:1}}
    </style>
</head>

<div class="list-view" id="list-view">

<div class="editor-view" id="editor-view">

            <button class="ev-back" onclick="closeEditor()"><i class="fa-solid fa-arrow-left"></i> Back to Problems</button>

            <div class="ed-monaco" id="ed-monaco"></div>
            <div class="ed-results" id="ed-results">
                <div class="res-idle">Select a problem and write your solution. Click <strong>Run</strong> to test against sample cases or <strong>Submit</strong> to check all cases.</div>
            </div>
        </div>
    </div>
</div>

<script>

let db = null; // Firestore instance

// ═══════════════════════════════════════════════════
// PROBLEM DATABASE (with test cases)
// ═══════════════════════════════════════════════════
const PROBLEMS = [

    ],
    starters:{
      javascript:'function twoSum(nums, target) {\n  // Your code here\n}\n\n// Read input\nconst lines = require("fs").readFileSync("/dev/stdin","utf8").trim().split("\\n");\nconst nums = lines[0].split(" ").map(Number);\nconst target = parseInt(lines[1]);\nconst result = twoSum(nums, target);\nconsole.log(result.join(" "));',
      python:'def two_sum(nums, target):\n    # Your code here\n    pass\n\nnums = list(map(int, input().split()))\ntarget = int(input())\nresult = two_sum(nums, target)\nprint(*result)',
      java:'import java.util.*;\npublic class Main {\n    public static int[] twoSum(int[] nums, int target) {\n        // Your code here\n        return new int[]{};\n    }\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n        String[] parts = sc.nextLine().split(" ");\n        int[] nums = new int[parts.length];\n        for(int i=0;i<parts.length;i++) nums[i]=Integer.parseInt(parts[i]);\n        int target = sc.nextInt();\n        int[] res = twoSum(nums, target);\n        System.out.println(res[0]+" "+res[1]);\n    }\n}',
      cpp:'#include<bits/stdc++.h>\nusing namespace std;\nint main(){\n    string line; getline(cin,line);\n    istringstream iss(line);\n    vector<int> nums; int x;\n    while(iss>>x) nums.push_back(x);\n    int target; cin>>target;\n    // Your solution here\n    // Print two indices separated by space\n    return 0;\n}'

  { id:'max-subarray', topic:'Array', title:'Maximum Subarray', diff:'Medium', solved:false,

    examples:[
      {input:'nums = [-2,1,-3,4,-1,2,1,-5,4]', output:'6'},
      {input:'nums = [1]', output:'1'},
      {input:'nums = [5,4,-1,7,8]', output:'23'}
    ],
    allTests:[
      {input:'-2 1 -3 4 -1 2 1 -5 4', output:'6'},{input:'1', output:'1'},{input:'5 4 -1 7 8', output:'23'},
      {input:'-1', output:'-1'},{input:'-2 -1', output:'-1'}
    ],
    starters:{
      javascript:'const nums = require("fs").readFileSync("/dev/stdin","utf8").trim().split(" ").map(Number);\nlet maxSum = nums[0], cur = nums[0];\nfor(let i=1;i<nums.length;i++){cur=Math.max(nums[i],cur+nums[i]);maxSum=Math.max(maxSum,cur);}\n// Replace above with your solution\nconsole.log(maxSum);',
      python:'nums = list(map(int, input().split()))\n# Your solution here\nprint()',
      java:'import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n        String[] p = sc.nextLine().split(" ");\n        int[] nums = new int[p.length];\n        for(int i=0;i<p.length;i++) nums[i]=Integer.parseInt(p[i]);\n        // Your solution here\n        System.out.println();\n    }\n}',

  { id:'trapping-rain', topic:'Array', title:'Trapping Rain Water', diff:'Hard', solved:false,

    examples:[
      {input:'height = [0,1,0,2,1,0,1,3,2,1,2,1]', output:'6'},

      {input:'height = [1,0,1]', output:'1'}

    allTests:[

// Java/C++  → API fallback chain

async function executeCode(code, lang, stdin){
    if(lang==='javascript') return executeJS(code, stdin);
    if(lang==='python') return executePython(code, stdin);
    // Java / C++ → try APIs
    const apis = [tryJudge0, tryWandbox];
    for(const apiFn of apis){
        try{
            const r = await apiFn(code, lang, stdin);
            if(r && !r._apiFail) return r;
        }catch(e){console.log(apiFn.name+' error:',e.message)}
    }
    return {error:'All compiler APIs are currently unavailable. Please try again in a few minutes or use JavaScript/Python (both run in-browser, no API needed).', output:''};
}

// ── JavaScript: browser eval ──
function executeJS(code, stdin){
    return new Promise(resolve=>{
        try{
            let output=[];
            const cons={log:(...a)=>output.push(a.map(String).join(' ')),
                        error:(...a)=>output.push(a.map(String).join(' '))};
            const fakeRequire=(m)=>{
                if(m==='fs') return {readFileSync:()=>stdin||''};
                return {};
            };
            const fn=new Function('console','require',code);
            fn(cons, fakeRequire);
            resolve({output:output.join('\n').trim(), error:''});
        }catch(e){ resolve({output:'', error:e.toString()}); }
    });
}

// ── Python: Pyodide (WebAssembly, runs in browser!) ──
let pyodideInstance = null;
let pyodideLoading = false;
async function loadPyodide(){
    if(pyodideInstance) return pyodideInstance;
    if(pyodideLoading) {
        while(pyodideLoading) await new Promise(r=>setTimeout(r,200));
        return pyodideInstance;
    }
    pyodideLoading = true;
    // Load Pyodide script
    if(!window.loadPyodide){
        await new Promise((resolve, reject)=>{
            const s=document.createElement('script');
            s.src='https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
            s.onload=resolve; s.onerror=reject;
            document.head.appendChild(s);
        });
    }
    pyodideInstance = await window.loadPyodide();
    pyodideLoading = false;
    return pyodideInstance;
}

async function executePython(code, stdin){
    try{
        const py = await loadPyodide();
        // Mock stdin with io.StringIO
        const wrappedCode = `
import sys, io
sys.stdin = io.StringIO(${JSON.stringify(stdin||'')})
_output = io.StringIO()
_old_stdout = sys.stdout
sys.stdout = _output
try:
${code.split('\n').map(l=>'    '+l).join('\n')}
except SystemExit:
    pass
except Exception as e:
    print(str(e), file=sys.stderr if hasattr(sys,'stderr') else _output)
sys.stdout = _old_stdout
_output.getvalue()
`;
        const result = await py.runPythonAsync(wrappedCode);
        return {output:(result||'').trim(), error:''};
    }catch(e){
        return {output:'', error:e.message||e.toString()};
    }
}

const JUDGE0_LANG_IDS = {java:62, cpp:54}; // Java (OpenJDK 13), C++ (GCC 9.2)
const JUDGE0_HOST = 'judge029.p.rapidapi.com';
const JUDGE0_KEY = '1efc9af920msh1d6d2d88685fe6ep1cab6cjsna38c888dfd4f';

async function tryJudge0(code, lang, stdin){
    const langId=JUDGE0_LANG_IDS[lang]; if(!langId) return {_apiFail:true};
    try{
        // Submit code
        const res=await fetch('https://'+JUDGE0_HOST+'/submissions?base64_encoded=true&wait=true&fields=stdout,stderr,compile_output,status',{
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'X-RapidAPI-Key':JUDGE0_KEY,
                'X-RapidAPI-Host':JUDGE0_HOST
            },
            body:JSON.stringify({
                language_id:langId,
                source_code:btoa(unescape(encodeURIComponent(code))),
                stdin:btoa(unescape(encodeURIComponent(stdin||'')))
            })
        });
        if(!res.ok) return {_apiFail:true};
        const d=await res.json();
        // Decode base64 outputs
        const decode=s=>{try{return decodeURIComponent(escape(atob(s||'')));}catch(e){return s||'';}};
        const stdout=decode(d.stdout).trim();
        const stderr=decode(d.stderr).trim();
        const compileErr=decode(d.compile_output).trim();
        // Check status: 3 = Accepted
        if(d.status&&d.status.id===6) return {error:compileErr||'Compilation Error', output:''};
        if(d.status&&d.status.id>3) return {error:stderr||compileErr||'Runtime Error ('+d.status.description+')', output:stdout};
        return {output:stdout, error:stderr};
    }catch(e){console.warn('Judge0:',e.message); return {_apiFail:true};}
}

// ── FALLBACK API: Wandbox ──
const WANDBOX_MAP = {java:'openjdk-jdk-17.0.0+35', cpp:'gcc-12.2.0'};
async function tryWandbox(code, lang, stdin){
    const compiler=WANDBOX_MAP[lang]; if(!compiler) return {_apiFail:true};
    try{
        const res=await fetch('https://wandbox.org/api/compile.json',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({code,compiler,stdin:stdin||'','compiler-option-raw':lang==='cpp'?'-std=c++17':''})
        });
        if(!res.ok) return {_apiFail:true};
        const d=await res.json();
        if(d.compiler_error) return {error:d.compiler_error, output:''};
        const out=(d.program_output||'').trim(), err=(d.program_error||'').trim();
        if(d.status&&d.status!=='0'&&!out) return {error:err||'Runtime error', output:''};
        return {output:out, error:err};
    }catch(e){return {_apiFail:true};}
}

                lastActive:firebase.firestore.FieldValue.serverTimestamp()
            },{merge:true});
        }catch(e){console.warn('Save solved:',e.message)}
    }
    setButtonsLoading(false);
}

function setButtonsLoading(loading){
    document.getElementById('btn-run').disabled=loading;
    document.getElementById('btn-submit').disabled=loading;
}

// ═══════════════════════════════════════════════════
// FIRESTORE: LOAD & SAVE USER DATA
// ═══════════════════════════════════════════════════
async function loadUserData(uid){
    try{
        const doc=await db.collection('users').doc(uid).get();
        if(doc.exists){
            const data=doc.data();
            // Restore solved problems
            (data.solvedProblems||[]).forEach(pid=>{
                const p=PROBLEMS.find(x=>x.id===pid);
                if(p) p.solved=true;
            });
            // Restore saved codes
            if(data.savedCodes) savedCodes=data.savedCodes;
        }
        renderProblemList();
    }catch(e){console.warn('Load user data:',e.message)}
}

function recalcStats(){
    let total=0,easy=0,medium=0,hard=0;
    PROBLEMS.forEach(p=>{
        if(p.solved){
            total++;
            if(p.diff==='Easy') easy++;
            else if(p.diff==='Medium') medium++;
            else if(p.diff==='Hard') hard++;
        }
    });
    return {total,easy,medium,hard};
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderTopicBar();
renderProblemList();
</script>
